name: Actualizar clasificaciones

on:
  # Cada 15 min en horario de partidos (14:00–07:00 UTC = 16:00–09:00 España CEST)
  # Solo durante el torneo: 11 jun – 19 jul 2026
  schedule:
    # Cada hora durante el torneo (campo: min hora día mes día_semana)
    # Horas 0-6 UTC = madrugada española · 14-23 UTC = tarde/noche española
    # 4 endpoints × ~17 runs/día ≈ 68 calls/día (límite free: 100)
    - cron: '0 0-6,14-23 11-30 6 *'   # Junio 11–30
    - cron: '0 0-6,14-23 1-19  7 *'   # Julio 1–19
  # Permite lanzarlo manualmente desde GitHub si hace falta
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: Actualizar standings.json
        run: python scraper/scrape.py

      - name: Commit y push (solo si hay cambios)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standings.json
          git diff --staged --quiet && echo "Sin cambios." || \
            git commit -m "chore: clasificaciones $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
